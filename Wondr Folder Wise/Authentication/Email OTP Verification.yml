runtime:
  scripts:
    - type: after-response
      code: |-
        // Parse the JSON response
        const jsonData = res.getBody();

        // Extract the accessToken and refreshToken
        const accessToken = jsonData.Response.accessToken;
        const refreshToken = jsonData.Response.refreshToken;

        // Save both tokens to environment variables
        bru.setEnvVar("accessToken", accessToken);
        bru.setEnvVar("refreshToken", refreshToken);

        console.log("Access token saved to environment variable:", accessToken);
        console.log("Refresh token saved to environment variable:", refreshToken);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
