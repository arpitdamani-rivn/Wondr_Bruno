info:
  name: Create KYC
  type: http
  seq: 1

http:
  method: POST
  url: http://192.168.1.234:3000/v1/auth/verifications/kyc/create
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
