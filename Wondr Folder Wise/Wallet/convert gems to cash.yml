info:
  name: convert gems to cash
  type: http
  seq: 9

http:
  method: POST
  url: "{{local_dev}}/wallets/convert"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "fromCurrency": "DIGITAL_COIN",
        "toCurrency": "DIGITAL_GBP",
        "fromAmount": 1500,
        "toAmount": 1.5
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
