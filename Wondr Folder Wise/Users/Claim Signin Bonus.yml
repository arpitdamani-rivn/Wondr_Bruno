info:
  name: Claim Signin Bonus
  type: http
  seq: 13

http:
  method: GET
  url: "{{local}}/users/signinBonus"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
