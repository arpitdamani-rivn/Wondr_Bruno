info:
  name: orderListing
  type: http
  seq: 2

http:
  method: GET
  url: "{{base_url}}/orders/listOrders"
  params:
    - name: timeFilter
      value: last_week
      type: query
      disabled: true
    - name: timeFilter
      value: last_month
      type: query
      disabled: true
    - name: timeFilter
      value: last_6_months
      type: query
      disabled: true
    - name: timeFilter
      value: last_year
      type: query
      disabled: true
    - name: page
      value: ""
      type: query
      disabled: true
    - name: limit
      value: ""
      type: query
      disabled: true
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
